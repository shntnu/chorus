name: chorus-enformer
channels:
  - conda-forge
  - bioconda
dependencies:
  # Core Python

  - python=3.10
  
  # Essential scientific computing
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scipy>=1.7.0
  
  # Core bioinformatics
  - pysam>=0.19.0
  - biopython>=1.79
  - pyfaidx>=0.7.0
  
  # Utilities
  - tqdm>=4.62.0
  - h5py>=3.6.0
  
  # Visualization (for Enformer's contribution scores)
  - matplotlib>=3.5.0
  - seaborn>=0.11.0
  - matplotlib-inline>=0.2.1
  
  # TensorFlow ecosystem
  - pip:
    # Enformer specific dependencies.
    # Pin TF to 2.13 — TF 2.14.1 hits "JIT compilation failed" on the
    # Enformer saved_model's cross_replica_batch_norm/Rsqrt op under
    # XLA (verified in 2026-04-15 fresh-install audit). TF 2.13.1 loads
    # and runs the same saved_model cleanly.
    - tensorflow==2.13.*
    - tensorflow-hub>=0.12.0
    - tensorflow-datasets>=4.0.0
    - setuptools<81  # tensorflow_hub requires pkg_resources
    # CUDA support for GPU (Linux only — macOS adaptation removes these).
    # TF 2.13 requires CUDA 11.8 + cuDNN 8.6.
    - nvidia-cublas-cu11>=11.11
    - nvidia-cuda-cupti-cu11>=11.8
    - nvidia-cuda-runtime-cu11>=11.8
    - nvidia-cudnn-cu11>=8.6,<9.0
    - nvidia-cufft-cu11>=10.9
    - nvidia-curand-cu11>=10.3
    - nvidia-cusolver-cu11>=11.4
    - nvidia-cusparse-cu11>=11.7