name: chorus-alphagenome
channels:
  - conda-forge
  - bioconda
dependencies:
  # Core Python (AlphaGenome requires >=3.11)
  - python=3.11

  # Essential scientific computing
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scipy>=1.7.0

  # Core bioinformatics
  - pysam>=0.19.0
  - biopython>=1.79
  - pyfaidx>=0.7.0

  # Utilities
  - tqdm>=4.62.0
  - h5py>=3.6.0

  # Build tools (pyranges → sorted_nearest requires C compilation on Python 3.11)
  - compilers

  # Visualization
  - matplotlib
  - seaborn

  - pip:
    # JAX ecosystem
    - jax[cpu]
    - dm-haiku
    - optax
    - chex
    - einshape
    - orbax-checkpoint
    - jaxtyping

    # TensorFlow (needed by alphagenome for some data processing)
    - tensorflow>=2.15.0

    # Data / model hubs
    - huggingface_hub
    - kagglehub

    # Filesystem / networking (needed by alphagenome for FASTA loading)
    - aiohttp
    - fsspec

    # Bioinformatics pip packages
    - pybigwig
    - pyranges
    - anndata
    - pyarrow

    # AlphaGenome packages (installed from GitHub)
    - alphagenome @ git+https://github.com/google-deepmind/alphagenome.git
    - alphagenome-research @ git+https://github.com/google-deepmind/alphagenome_research.git
