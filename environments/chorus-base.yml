name: chorus
channels:
  - conda-forge
  - bioconda
dependencies:
  # Core Python
  - python=3.10

  # Essential scientific computing
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scipy>=1.7.0

  # Core bioinformatics
  - pysam>=0.19.0
  - biopython>=1.79
  - pyfaidx>=0.7.0
  # gtfsort: Linux-only (bioconda), install separately on Linux: mamba install -c bioconda gtfsort

  # Utilities
  - tqdm>=4.62.0
  - h5py>=3.6.0
  - pyyaml>=6.0

  # For development and testing
  - pytest>=6.0
  - pytest-cov>=2.0
  - black>=22.0
  - flake8>=4.0

  # Jupyter support (optional)
  - jupyter
  - notebook
  - ipykernel

  # Package management
  - pip
  - setuptools>=65.0
  - wheel>=0.37.0

  # Visualization
  - matplotlib>=3.5.0
  - seaborn>=0.11.0

  # pip-only packages (coolbox >=0.4.0 requires pip; conda version lacks ARM64 support)
  - pip:
    - coolbox>=0.4.0
    - oxbow>=0.4.0
    - fastmcp>=3.0
